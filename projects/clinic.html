<!DOCTYPE html>
<html>
<head>
<title>Dark Mode</title>

<style>

body{
    background-color: white;
    color: black;
    transition: 0.3s;
    font-family: Arial;
}

.dark{
    background-color: #121212;
    color: white;
}

button{
    padding:10px 20px;
    cursor:pointer;
    border:none;
    background:#333;
    color:white;
    margin:20px;
}

</style>

</head>

<body>

<button id="modeBtn">Dark / Light</button>

<h1>Welcome to my website</h1>
<p>This is a test for dark mode.</p>

<script>

let btn = document.getElementById("modeBtn");

btn.onclick = function(){
    document.body.classList.toggle("dark");
}

</script>

</body>
</html>
